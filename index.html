<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>to 白总</title>
<style>
    body, html {
        height: 100%;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    #refuseBtn {
        position: absolute;
    }
</style>
</head>
<body>

<div id="content">你愿意和我在一起吗？</div>
<button id="acceptBtn">接受</button>
<button id="refuseBtn">拒绝</button>

<script>
document.getElementById('refuseBtn').addEventListener('mouseenter', function() {
    const x = Math.random() * (window.innerWidth - this.clientWidth);
    const y = Math.random() * (window.innerHeight - this.clientHeight);
    this.style.left = x + 'px';
    this.style.top = y + 'px';
});

document.getElementById('acceptBtn').addEventListener('click', function() {
    alert('我们在一起吧！');
});
</script>
</body>
</html>
