<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Fullscreen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .emoji-container {
            font-size: calc(10vmin + 10vh); /* 根据视窗大小动态调整字体大小 */
            text-align: center;
        }
    </style>
</head>
<body>

<div class="emoji-container">🤡</div>

</body>
</html>
