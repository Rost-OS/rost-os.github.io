<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>click</title>
</head>

<body>
    <button id="genshinButton">原神</button>

    <script>
        var button = document.getElementById('genshinButton');
        button.addEventListener('click', function() {
            alert("藕片。");
        });
    </script>

</body>

</html>
